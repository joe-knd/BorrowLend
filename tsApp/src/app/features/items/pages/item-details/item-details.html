<h2>Item Details</h2>

@if (isLoadingItem()) {
  <div class="alert alert-info">Loading item details...</div>
}

@if (loadError()) {
  <div class="alert alert-danger">{{ loadError() }}</div>
}

@if (item()) {
  <app-item-card [item]="item()!"></app-item-card>
}

<h3>Owner</h3>
@if (isLoadingOwner()) {
  <p>Loading owner...</p>
}
@if (owner()) {
  <app-user-card [user]="owner()!"></app-user-card>
}

<h3>Status</h3>
<p>{{ item()?.status }}</p>
