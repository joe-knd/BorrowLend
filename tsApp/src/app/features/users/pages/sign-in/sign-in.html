<div class="card border-0 shadow-sm sign-in">
  <div class="card-body p-4 p-md-5">
  <h2 class="h4 mb-3">Sign In</h2>

  @if (justRegistered) {
    <div class="alert alert-success">Registration complete. Please sign in.</div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-3">
      <label class="form-label" for="email">Email</label>
      <input class="form-control" id="email" type="email" formControlName="email" />
    </div>

    <div class="mb-3">
      <label class="form-label" for="password">Password</label>
      <input class="form-control" id="password" type="password" formControlName="password" />
    </div>

    @if (errorMessage) {
      <div class="alert alert-danger">{{ errorMessage }}</div>
    }

    <button class="btn btn-primary w-100" type="submit" [disabled]="form.invalid || isSubmitting">
      {{ isSubmitting ? 'Signing in...' : 'Sign In' }}
    </button>
  </form>

  <p class="helper text-muted mt-3 mb-0">No account yet? <a routerLink="/users/register">Register here</a>.</p>
  </div>
</div>
